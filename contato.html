<!DOCTYPE html> 
 <html lang="en"> 
 <head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Contato</title> 
    <script src="https://cdn.tailwindcss.com"></script>
  <!--<script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>-->
 </head> 
 <body class="bg-gray-50 text-gray-900 font-sans"> 
    
    <header class="bg-gray-900 sticky top-0 shadow-md z-50"> 
        <nav class="menu max-w-6xl mx-auto p-4 flex justify-between items-center"> 
            <img class="menu-icon w-8 cursor-pointer" src="public/hacker.svg" alt="icone de menu" onclick="alert('Menu oculto')"> 
            <ul class="flex gap-6 text-white font-medium hidden md:flex"> 
                <li><a href="index.html#inicio" class="hover:text-blue-900">Início</a></li> 
                <li><a href="index.html#sobre" class="hover:text-blue-900">Sobre</a></li> 
                <li><a href="index.html#projetos" class="hover:text-blue-900">Projetos</a></li> 
                <li><a href="index.html#competencias" class="hover:text-blue-900">Competências</a></li> 
            </ul> 
            <img id="btn-tema" class="w-8 h-8 cursor-pointer hover:opacity-80 transition-all bg-white rounded-full p-1" src="public/figura_modo_noturno.svg" alt="Alternar modo noturno" title="Alternar tema">
        </nav> 
    </header> 
     
    <main class="max-w-xl mx-auto py-10 px-4">
        
        <!--<form action="/processar" method="POST" class="bg-white p-8 rounded shadow-lg border-t-4 border-blue-900 flex flex-col gap-4"> <h2 class="text-2xl font-bold text-center text-blue-900 mb-4">Envie uma mensagem</h2>-->
        <form action="identificacao-visual.html" data-formulario class="bg-white p-8 rounded shadow-lg border-t-4 border-blue-900 flex flex-col gap-6 form transition-colors">
        <!--<section class="bg-white p-8 rounded shadow-lg border-t-4 border-blue-900 flex flex-col gap-6 form">-->
            <!--action: URL para onde enviar os dados-->
            <!--method: Método HTTP (GET ou POST), GET para buscas (dados visíveis na URL) e POST para envio de dados sensíveis (dados no corpo da requisição)-->
            <!--<section class="bg-white p-8 rounded shadow-lg border-t-4 border-blue-900 flex flex-col items-center gap-6 text-center form">-->
                <div class="text-center">
                    <h2 class="text-2xl font-bold text-blue-900 mb-1">Contato</h2>
                    <p class="text-gray-600 font-bold">Etapa 1 de 3: Preencha o formulário abaixo com os seus dados!</p>
                </div>
                <div class="flex flex-col">
                    <label for="nome" class="font-bold text-gray-900 mb-1">Nome: </label> 
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required class="border p-2 rounded bg-gray-50">
                    <span class="mensagem-erro text-red-500 text-sm hidden"></span>
                </div>
                    <!--placeholder: Texto de exemplo, required, Validação HTML5-->
                <div class="flex flex-col">
                    <label for="cpf" class="font-bold text-gray-900 mb-1">CPF (apenas números): </label> 
                    <input type="text" id="cpf" name="cpf" required minlength="11" maxlength="14" pattern="\d{3}\.?\d{3}\.?\d{3}-?\d{2}" class="border p-2 rounded bg-gray-50"> 
                    <span class="mensagem-erro text-red-500 text-sm hidden"></span>
                </div>
                <div class="flex flex-col">
                    <label for="email" class="font-bold text-gray-900 mb-1">Email: </label> 
                    <input type="email" id="email" name="email" placeholder="Seu email" required class="border p-2 rounded bg-gray-50"> 
                    <span class="mensagem-erro text-red-500 text-sm hidden"></span>
                </div>

                <div class="flex flex-col">
                    <label for="idade" class="font-bold text-gray-900 mb-1">Idade: </label> 
                    <input type="number" id="idade" name="idade" min="0" max="120" placeholder="Sua idade" required class="border p-2 rounded bg-gray-50"> 
                    <span class="mensagem-erro text-red-500 text-sm hidden"></span>
                </div>

                <div>
                    <label class="font-bold text-gray-900 block mb-1">Gênero: </label> 
                    <div class="radio-group flex gap-4 items-center bg-gray-50 p-2 border rounded"> 
                        <div class="flex items-center gap-1">
                            <input type="radio" name="genero" value="M" id="masculino"> 
                            <label for="masculino">M</label> 
                        </div>
                        
                        <div class="flex items-center gap-1">
                            <input type="radio" name="genero" value="F" id="feminino"> 
                            <label for="feminino">F</label> 
                        </div>
                    </div> 
                </div>
                
                <div class="flex flex-col">
                    <label for="data_nascimento" class="font-bold text-gray-900 mb-1">Data de nascimento: </label> 
                    <input type="date" id="nascimento" name="nascimento" placeholder="Sua data de nascimento" required class="border p-2 rounded bg-gray-50"> 
                    <span class="mensagem-erro text-red-500 text-sm hidden"></span>
                </div>

                <div class="flex flex-col">
                    <label for="foto" class="font-bold text-gray-900 mb-1">Arquivos anexos: </label> 
                    <input type="file" id="foto" name="foto" class="border p-2 rounded bg-gray-50 text-sm"> 
                    <!--retirei accept="image/*" para permitir qualquer tipo de arquivo, nao so foto, foto ficará para uma etapa posterior-->
                </div>

                <div class="flex flex-col">
                    <label for="pais" class="font-bold text-gray-900 mb-1">País:</label> 
                    <!--Select Simples-->
                    <select id="pais" name="pais" class="border p-2 rounded bg-gray-50"> 
                        <option value="">Selecione um país</option>  <!--value: Valor enviado no formulário-->
                        <option value="br">Brasil</option> 
                        <option value="us">Estados Unidos</option> 
                        <option value="uk">Reino Unido</option> 
                    </select> 
                </div>

                <div class="flex flex-col">
                    <label for="linguagens" class="font-bold text-gray-900 mb-1">Linguagens que você conhece:</label> 
                    <select id="linguagens" name="linguagens" multiple size="4" class="border p-2 rounded bg-gray-50"> <!--Select Múltiplo-->
                        <!--multiple: Permite seleção múltipla, size: Número de opções visíveis-->
                        <option value="js">JavaScript</option> 
                        <option value="py">Python</option> 
                        <option value="java">Java</option> 
                        <option value="cpp">C++</option> 
                        <!--required: Campo obrigatório, disabled: Campo desabilitado-->
                        </select> 
                </div>

                <div class="flex flex-col">
                    <label for="mensagem" class="font-bold text-gray-900 mb-1">Mensagem:</label> 
                    <!--rows: Número de linhas visíveis, cols: Número de colunas (largura)-->
                    <textarea id="mensagem" name="mensagem" rows="4" class="border p-2 rounded bg-gray-50">  
                        Digite sua mensagem aqui... 
                    </textarea> 
                </div>

                <!--<div class="flex flex-col">
                    <label for="comentario" class="font-bold text-gray-900 mb-1">Comentário:</label> 
                    <textarea  
                        id="comentario"  
                        name="comentario"  
                        rows="5"  
                        class="border p-2 rounded bg-gray-50"
                        placeholder="Digite seu comentário (máximo 500 caracteres)" 
                        maxlength="500" 
                        required> 
                    </textarea> 
                    <small class="text-gray-500 text-right mt-1">Caracteres restantes: <span id="contador">500</span></small> 
                </div>-->

                <button type="submit" class="bg-blue-900 text-white font-bold py-3 rounded hover:bg-blue-900 mt-4">Enviar</button> 
            <!--</section>-->
        </form> 
    </main>

    <script src="js/script.js" type="module"></script>
 </body> 
 </html>
